# Required configuration
autoinstall:
    version: 1 # Define a versão da configuração do autoinstall. Atualmente, deve ser "1".
    interactive-sections: # Lista de etapas a serem exibidas durante a instalação
        - network # Exibe a tela de conexão com a rede
    identity: # Configura o usuário inicial para o sistema
        realname: 'Igor'
        username: irs
        # ATENÇÃO: Gere um hash para a senha com o comando "mkpasswd usando o pacote whois"
        password: '$y$j9T$uhkxlm8nUQaNu.6rl4k2d.$DIldpYy96OHg8lFjfXfc671BZcGWkPOmaDONGAhGSg3'
        hostname: irs-ubuntu
# Optional configuration
    storage: # Especifica o layout de partição a ser usado
    # AVISO: ISTO APAGA O DISCO INTEIRO!
        layout:
            name: hybrid # Usa TPM
            encrypted: yes
    keyboard:
        layout: br
    timezone: "America/Sao_Paulo" # Define o fuso horário para Brasília
    source: # Especifica a variante do Ubuntu a ser instalada
        id: ubuntu-desktop # Instalação padrão do Ubuntu Desktop
    codecs: # Instala codecs restritos
        install: true # Instala (ubuntu-restricted-addons)
    drivers: # Instala drivers de terceiros
        install: true # Instala drivers adicionais (como os da Nvidia)
    packages: # Lista de pacotes .deb a serem instalados, adicione outros pacotes .deb aqui se necessário
        - firefox 
    snaps: # Lista de snaps a serem instalados
        - name: slack
          channel: stable
          classic: true # Slack geralmente requer modo clássico
    updates: all # Instala todas as atualizações após a instalação
    shutdown: reboot # Reinicia após a instalação
    error-commands: # Comandos em caso de falha
        - tar -czf /installer-logs.tar.gz /var/log/installer
        - journalctl -b > /installer-journal.log
    kernel-crash-dumps:
        enabled: false
